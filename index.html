<!DOCTYPE html> 
<html>
	<head lang="en">
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<!-- Boostrap CSS Link -->
		<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

		<!-- Bootstrap Icon Link -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

		<title>Helloworld LogIn</title>
	</head>
	<body>
		<!-- LogIn Page Start -->
		<section id="login">
			<div class="container-fluid">
				<div class="row">
					<div class="col-md-6 width-50 bg-secondary">
						<form class="m-5 p-5 bg-white">
							<p class="text-end">
								<strong>
									Log into Helloworld
									<i class="bi bi-chevron-right color-dark"></i>
								</strong>
							</p>
							  <div class="mb-3">
							    <label for="exampleInputEmail1" class="form-label">Email address</label>
							    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Email">
							  </div>
							  <div class="mb-3">
							    <label for="exampleInputPassword1" class="form-label">Password</label>
							    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
							  </div>
							  <button type="submit" class="btn btn-primary w-100 my-2">Log in</button>
							  <a href="#" class="d-block text-center text-decoration-none text-dark py-3">
							      Forgot password?
							  </a>
							  <button type="submit" class="btn btn-primary w-100 border-1 bg-white text-primary mt-4">Create new account</button>
							  <p class="text-center my-2">
							  	<i class="bi bi-water"></i>
							  	Lael
							  </p>
						</form>
            <div class="col-md-6 border-end pe-5">
              <h2 class="mb-3">AutoCustoms</h2>
              <p class="w-85">
                  AutoCustoms is a forward-thinking car company dedicated to
                  crafting innovative, high-performance vehicles that blend
                  cutting-edge technology with exceptional design.
              </p>

              <button class="rounded bg-primary border-0 p-2 text-white mt-2">
                  Check out our Projects!
              </button>
              <img src="resources/images/onepiece.png" class="img-fluid image w-75" alt="Strawhat">
            </div>
					</div>
				</div>
			</div>
		</section>
		<!-- LogIn Page End -->

		<!-- Bootstrap JS Script -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
