<!DOCTYPE html> 
<html>
	<head lang="en">
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<!-- Boostrap CSS Link -->
		<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

		<!-- Bootstrap Icon Link -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

		<title>Helloworld LogIn</title>
	</head>
	<body>
		<!-- LogIn Page Start -->
		<section id="login">
			<div class="container-fluid vh-100">
				<div class="row">
					<div class="col-md-6 border d-flex justify-content-center align-items-center">
						<form class="p-5 my-auto bg-white w-100 mx-0">
							<p class="text-end">
								<strong>
									Log into Helloworld
									<i class="bi bi-chevron-right color-dark"></i>
								</strong>
							</p>
							  <div class="mb-3">
							    <label for="exampleInputEmail1" class="form-label" required>Email address</label>
							    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Email" required>
							  </div>
							  <div class="mb-3">
							    <label for="exampleInputPassword1" class="form-label">Password</label>
							    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password" required>
							  </div>
							  <button type="submit" class="btn btn-primary w-100 my-2">Log in</button>
							  <a href="#" class="d-block text-center text-decoration-none text-dark py-3">
							      Forgot password?
							  </a>
							  <button type="submit" class="btn btn-primary w-100 border-1 bg-white text-primary mt-4">Create new account</button>
							  <p class="text-center my-2">
							  	<i class="bi bi-water"></i>
							  	Lael
							  </p>
						</form>
					</div>
		            <div class="col-md-6 vh-100 d-flex justify-content-center align-items-center">
		              <img src="resources/images/onepiece.png" class="img-fluid image" alt="Strawhat" class="img-fluid my-auto">
		            </div>
				</div>
			</div>
		</section>
		<!-- LogIn Page End -->

		<!-- Bootstrap JS Script -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
